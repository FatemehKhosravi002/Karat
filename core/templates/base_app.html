<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">TaskFlow</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'style.css' %}" />
</head>
<body>

<div class="app-layout">
  <nav id="sidebar">
    <div>
      <a href="/" class="sidebar-logo" style="text-decoration:none;">
        <div class="logo-icon"><i class="bi bi-check2-all"></i></div>
        <span class="logo-text">TaskFlow</span>
      </a>
      <div class="sidebar-nav">
        <div class="nav-label">وظایف</div>
        <a href="/" class="sidebar-link" data-path="/"><i class="bi bi-house-door"></i> داشبورد</a>
        <a href="/tasks/" class="sidebar-link" data-path="/tasks/"><i class="bi bi-list-task"></i> همه وظایف <span class="badge-count" id="sb-task-count" style="display:none;">0</span></a>
        <a href="/tags/" class="sidebar-link" data-path="/tags/"><i class="bi bi-tags"></i> تگ‌ها</a>
        <a href="/profile/" class="sidebar-link" data-path="/profile/"><i class="bi bi-person"></i> پروفایل</a>
      </div>
    </div>
    
    <div class="sidebar-footer">
      <div class="d-flex align-items-center gap-2 mb-2">
        <div class="user-avatar">U</div>
        <div class="user-info">
          <div class="user-name fw-semibold text-white">کاربر</div>
          <div class="user-username text-muted small">@username</div>
        </div>
      </div>
      <button onclick="logout()" class="btn btn-outline-danger btn-sm w-100 mt-2">
        <i class="bi bi-box-arrow-right"></i> خروج از حساب
      </button>
    </div>
  </nav>

  <div class="main-viewport">
    <header class="topbar">
      <button class="btn d-md-none me-2" onclick="openSidebar()"><i class="bi bi-list fs-4"></i></button>
      <h1 id="topbar-title" class="h5 mb-0 fw-bold">داشبورد</h1>
      
      <form id="search-form" class="ms-auto position-relative" style="max-width: 260px; width: 100%;">
        <i class="bi bi-search position-absolute top-50 translate-middle-y text-muted" style="right: 12px; z-index: 5;"></i>
        <input type="text" id="search-input" class="form-control form-control-sm" placeholder="جستجو..." style="text-align: right; padding-right: 35px !important; border-radius: 20px; background-color: #f8f9fa;">
      </form>
    </header>

    <main id="content" class="p-4">
      </main>
  </div>
</div>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<div class="modal fade" id="taskModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius: var(--radius); border: none; box-shadow: var(--shadow-md);">
      <form id="task-form">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold" id="taskModalTitle">Task</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" style="margin-right: auto; margin-left: 0;"></button>
        </div>
        <div class="modal-body">
          <div id="modal-error" class="alert alert-danger py-2 d-none"></div>
          <div class="mb-3">
            <label class="form-label small fw-medium text-secondary">Title</label>
            <input type="text" id="task-title" class="form-control" required style="border-radius: 8px;">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-medium text-secondary">Description</label>
            <textarea id="task-desc" class="form-control" rows="3" style="border-radius: 8px;"></textarea>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label small fw-medium text-secondary">Priority</label>
              <select id="task-priority" class="form-select" style="border-radius: 8px;">
                <option value="1">Low</option>
                <option value="2">Medium</option>
                <option value="3">High</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label small fw-medium text-secondary">Duration Scale</label>
              <select id="task-duration" class="form-select" style="border-radius: 8px;">
                <option value="short">Short</option>
                <option value="long">Long</option>
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-medium text-secondary">Due Date</label>
            <input type="text" id="task-due" class="form-control" placeholder="1403/01/01" style="border-radius: 8px;">
          </div>
          <div class="mb-1">
            <label class="form-label small fw-medium text-secondary d-block">Tags</label>
            <div id="modal-tags-container" class="d-flex flex-wrap gap-2 py-1"></div>
          </div>
        </div>
        <div class="modal-footer border-0 pt-0">
          <button type="button" class="btn btn-light btn-sm px-3" data-bs-dismiss="modal" style="border-radius: 8px;">Cancel</button>
          <button type="submit" class="btn btn-primary btn-sm px-4" style="border-radius: 8px;">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/api.js"></script>
<script src="/static/app.js"></script>
<script src="/static/pages.js"></script>
<script>
  function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('show'); }
  function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show'); }

  document.getElementById('search-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const q = document.getElementById('search-input').value.trim();
    if (q) window.location.href = '/tasks/?search=' + encodeURIComponent(q);
  });

  (async function init() {
    requireAuth();
    if (typeof setActiveSidebarLink === 'function') setActiveSidebarLink();
    await populateUserUI();

    getTasks({ is_deleted: 'false', is_completed: 'false' }).then(tasks => {
      const badge = document.getElementById('sb-task-count');
      if (tasks && tasks.length) { badge.textContent = tasks.length; badge.style.display = ''; }
    });
    if (typeof routePage === 'function') routePage();
  })();
</script>
</body>
</html>
