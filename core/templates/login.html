<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>کارات - ورود</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'style.css' %}" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">✦</span>
        <h1 class="logo-text">کارات</h1>
      </div>
      <p class="auth-subtitle">به مدیریت وظایف خود خوش آمدید</p>

      <div id="error-msg" class="alert alert-error hidden"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="username">نام کاربری</label>
          <input type="text" id="username" name="username" placeholder="نام کاربری خود را وارد کنید" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">رمز عبور</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="رمز عبور خود را وارد کنید" required autocomplete="current-password" />
            <button type="button" class="toggle-pass" id="toggle-pass">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          <span class="btn-text">ورود</span>
          <span class="btn-spinner hidden">⏳</span>
        </button>
      </form>

      <p class="auth-link">حساب کاربری ندارید؟ <a href="/register/">ثبت‌نام کنید</a></p>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const loginBtn = document.getElementById('login-btn');
    const togglePass = document.getElementById('toggle-pass');
    const passInput = document.getElementById('password');

    togglePass.addEventListener('click', () => {
      const type = passInput.type === 'password' ? 'text' : 'password';
      passInput.type = type;
      togglePass.textContent = type === 'password' ? '👁' : '🙈';
    });

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.add('hidden');
      loginBtn.querySelector('.btn-text').textContent = 'در حال ورود...';
      loginBtn.querySelector('.btn-spinner').classList.remove('hidden');
      loginBtn.disabled = true;

      const username = document.getElementById('username').value.trim();
      const password = passInput.value;

      try {
        const res = await fetch('/account/token/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('access', data.access);
          localStorage.setItem('refresh', data.refresh);
          window.location.href = '/';
        } else {
          errorMsg.textContent = data.detail || 'نام کاربری یا رمز عبور اشتباه است.';
          errorMsg.classList.remove('hidden');
        }
      } catch (err) {
        errorMsg.textContent = 'خطا در اتصال به سرور. لطفاً دوباره تلاش کنید.';
        errorMsg.classList.remove('hidden');
      } finally {
        loginBtn.querySelector('.btn-text').textContent = 'ورود';
        loginBtn.querySelector('.btn-spinner').classList.add('hidden');
        loginBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
