<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>کارات - ثبت‌نام</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'style.css' %}" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">✦</span>
        <h1 class="logo-text">کارات</h1>
      </div>
      <p class="auth-subtitle">ساخت حساب کاربری جدید</p>

      <div id="error-msg" class="alert alert-error hidden"></div>
      <div id="success-msg" class="alert alert-success hidden"></div>

      <form id="register-form" novalidate>
        {% csrf_token %}
        <div class="form-group">
          <label for="name">نام و نام خانوادگی</label>
          <input type="text" id="name" name="name" placeholder="نام کامل خود را وارد کنید" required />
        </div>
        <div class="form-group">
          <label for="username">نام کاربری</label>
          <input type="text" id="username" name="username" placeholder="نام کاربری دلخواه (حداکثر ۲۰ کاراکتر)" required maxlength="20" />
        </div>
        <div class="form-group">
          <label for="password">رمز عبور</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="رمز عبور قوی انتخاب کنید" required />
            <button type="button" class="toggle-pass" id="toggle-pass">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="register-btn">
          <span class="btn-text">ثبت‌نام</span>
        </button>
      </form>

      <p class="auth-link">قبلاً ثبت‌نام کرده‌اید؟ <a href="/login/">وارد شوید</a></p>
    </div>
  </div>

  <script>
    const form = document.getElementById('register-form');
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    const togglePass = document.getElementById('toggle-pass');
    const passInput = document.getElementById('password');

    togglePass.addEventListener('click', () => {
      passInput.type = passInput.type === 'password' ? 'text' : 'password';
      togglePass.textContent = passInput.type === 'password' ? '👁' : '🙈';
    });
    function getCookie(name) {
    const v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
    return v ? v[2] : null;
    }
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.add('hidden');
      successMsg.classList.add('hidden');

      const payload = {
        name: document.getElementById('name').value.trim(),
        username: document.getElementById('username').value.trim(),
        password: passInput.value,
      };

      try {
        const res = await fetch('/account/register/', {
          method: 'POST',
            headers: { 
              'Content-Type': 'application/json',
              'X-CSRFToken': getCookie('csrftoken'),
            },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
          successMsg.textContent = 'حساب کاربری با موفقیت ساخته شد. در حال انتقال به صفحه ورود...';
          successMsg.classList.remove('hidden');
          setTimeout(() => window.location.href = '/login/', 1500);
        } else {
          const errs = Object.values(data).flat().join(' | ');
          errorMsg.textContent = errs || 'خطایی رخ داد.';
          errorMsg.classList.remove('hidden');
        }
      } catch (err) {
        errorMsg.textContent = 'خطا در اتصال به سرور.';
        errorMsg.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
